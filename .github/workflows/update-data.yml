name: Update dossier data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"   # ogni 3 ore

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Update articles dataset
        run: npm run update

      - name: Record last check timestamp
        run: |
          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          printf '{\n  "lastCheckedAt": "%s",\n  "lastCheckedBy": "github-actions"\n}\n' "$TIMESTAMP" > data/status.json

      - name: Commit and push if data changed
        run: |
          if git diff --quiet -- data/articles.json data/status.json; then
            echo "No data changes to commit."
            exit 0
          fi

          TIMESTAMP="$(date -u +"%Y-%m-%d %H:%M UTC")"
          ARTICLES_CHANGED=0
          if ! git diff --quiet -- data/articles.json; then
            ARTICLES_CHANGED=1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.json data/status.json
          if [ "$ARTICLES_CHANGED" -eq 1 ]; then
            git commit -m "Update articles dataset (${TIMESTAMP})"
          else
            git commit -m "Update check status (${TIMESTAMP})"
          fi
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
