<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Osservatorio Caso Delmastro</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="top-rule"></div>
    <div class="page-shell">
      <header class="masthead">
        <p class="edition-kicker">Archivio e monitoraggio</p>
        <p id="updated-relative" class="updated-relative"></p>
        <h1 class="nameplate">Osservatorio Caso Delmastro</h1>
        <div class="masthead-meta">
          <span id="date-window" class="meta-item"></span>
          <span id="masthead-count" class="meta-item"></span>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <details class="sidebar-section sources-panel" open>
            <summary class="panel-summary">
              <span class="panel-summary-label">Fonti</span>
            </summary>
            <div class="panel-body">
              <div class="sources-head">
                <h3>Fonti</h3>
                <button id="toggle-sources" class="text-button" type="button">Deseleziona tutte</button>
              </div>
              <div id="sources" class="source-filters"></div>
            </div>
          </details>
        </aside>

        <section class="content">
          <details class="timeline-card collapsible-panel">
            <summary class="section-head collapsible-summary">
              <h2>Andamento articoli per data</h2>
            </summary>
            <div class="chart-shell collapsible-body">
              <div class="chart-y-axis">
                <span id="chart-max"></span>
                <span id="chart-mid"></span>
                <span>0</span>
              </div>
              <div id="timeline" class="timeline"></div>
            </div>
          </details>

          <section class="articles-section">
            <div class="section-head">
              <h2>Rassegna</h2>
              <p id="article-count" class="section-caption"></p>
            </div>
            <div id="articles" class="article-list"></div>
          </section>
        </section>
      </main>
    </div>

    <template id="article-template">
      <article class="article">
        <div class="article-head">
          <span class="article-source"></span>
          <time class="article-time"></time>
        </div>
        <h2 class="article-title"></h2>
        <p class="article-excerpt"></p>
        <a class="article-link" target="_blank" rel="noreferrer">Apri la fonte</a>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
