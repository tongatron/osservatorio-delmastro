<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Osservatorio Caso Delmastro</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="top-rule"></div>
    <div class="page-shell">
      <header class="masthead">
        <div class="site-badges">
          <a class="site-badge" href="https://tongatron.github.io/" target="_blank" rel="noreferrer">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
              <path fill-rule="evenodd" d="M8.48 10.901C11.211 10.227 13 7.837 13 5A5 5 0 0 0 3 5c0 2.837 1.789 5.227 4.52 5.901l-.244.487a.25.25 0 1 0 .448.224l.04-.08c.009.17.024.315.051.45.068.344.208.622.448 1.102l.013.028c.212.422.182.85.05 1.246-.135.402-.366.751-.534 1.003a.25.25 0 0 0 .416.278l.004-.007c.166-.248.431-.646.588-1.115.16-.479.212-1.051-.076-1.629-.258-.515-.365-.732-.419-1.004a2 2 0 0 1-.037-.289l.008.017a.25.25 0 1 0 .448-.224zM4.352 3.356a4 4 0 0 1 3.15-2.325C7.774.997 8 1.224 8 1.5s-.226.496-.498.542c-.95.162-1.749.78-2.173 1.617a.6.6 0 0 1-.52.341c-.346 0-.599-.329-.457-.644"/>
            </svg>
            <span>tongatron.github.io</span>
          </a>
          <a class="site-badge site-badge-secondary" href="https://github.com/tongatron/osservatorio-delmastro" target="_blank" rel="noreferrer">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"/>
            </svg>
            <span>View source</span>
          </a>
        </div>
        <p class="edition-kicker">Archivio e monitoraggio</p>
        <div class="status-badge">
          <p id="checked-relative" class="checked-relative"></p>
        </div>
        <h1 class="nameplate">Osservatorio Caso Delmastro</h1>
        <div class="masthead-meta">
          <span id="date-window" class="meta-item"></span>
          <span id="masthead-count" class="meta-item"></span>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <details class="sidebar-section sources-panel" open>
            <summary class="panel-summary">
              <span class="panel-summary-label">Fonti</span>
            </summary>
            <div class="panel-body">
              <div class="sources-head">
                <h3>Fonti</h3>
                <button id="toggle-sources" class="text-button" type="button">Deseleziona tutte</button>
              </div>
              <div id="sources" class="source-filters"></div>
            </div>
          </details>
        </aside>

        <section class="content">
          <details class="timeline-card collapsible-panel">
            <summary class="section-head collapsible-summary">
              <h2>Andamento articoli per data</h2>
            </summary>
            <div class="chart-shell collapsible-body">
              <div class="chart-y-axis">
                <span id="chart-max"></span>
                <span id="chart-mid"></span>
                <span>0</span>
              </div>
              <div id="timeline" class="timeline"></div>
            </div>
          </details>

          <section class="articles-section">
            <div class="section-head">
              <h2>Rassegna</h2>
              <p id="article-count" class="section-caption"></p>
            </div>
            <div id="articles" class="article-list"></div>
          </section>
        </section>
      </main>
    </div>

    <template id="article-template">
      <article class="article">
        <div class="article-head">
          <span class="article-source"></span>
          <time class="article-time"></time>
        </div>
        <h2 class="article-title"></h2>
        <p class="article-excerpt"></p>
        <a class="article-link" target="_blank" rel="noreferrer">Apri la fonte</a>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
